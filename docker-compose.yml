services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fiscalflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fiscalflow}
      POSTGRES_DB: ${POSTGRES_DB:-fiscalflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fiscalflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      API_GLOBAL_PREFIX: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-fiscalflow}:${POSTGRES_PASSWORD:-fiscalflow}@postgres:5432/${POSTGRES_DB:-fiscalflow}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?defina JWT_ACCESS_SECRET no .env}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?defina JWT_REFRESH_SECRET no .env}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      AUTH_THROTTLE_LIMIT: ${AUTH_THROTTLE_LIMIT:-5}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      CERTIFICATE_ENCRYPTION_KEY: ${CERTIFICATE_ENCRYPTION_KEY:?defina CERTIFICATE_ENCRYPTION_KEY no .env}
    ports:
      - "${BACKEND_PORT:-3001}:3001"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3001/api
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-8080}:80"

volumes:
  postgres_data:
  redis_data:
