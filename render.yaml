services:
  - type: web
    name: fiscalflow-backend
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_GLOBAL_PREFIX
        value: api
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CERTIFICATE_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
